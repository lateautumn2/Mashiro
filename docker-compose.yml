services:
  backend:
    image: ghcr.io/lateautumn2/mashiro-backend:latest
    restart: unless-stopped
    environment:
      MASHIRO_PORT: 8080
      MASHIRO_DB_PATH: /data/mashiro.db
      MASHIRO_JWT_SECRET: replace-with-a-long-random-string
      MASHIRO_ADMIN_USERNAME: admin
      MASHIRO_ADMIN_PASSWORD: replace-with-your-initial-admin-password
    volumes:
      - ./mashiro-data:/data
    networks:
      - mashiro

  frontend:
    image: ghcr.io/lateautumn2/mashiro-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - mashiro

networks:
  mashiro:
