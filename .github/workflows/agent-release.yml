name: agent-release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build agent binaries
        working-directory: agent
        run: |
          mkdir -p ../dist

          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../dist/mashiro-agent_linux_amd64       .
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o ../dist/mashiro-agent_linux_arm64       .
          GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../dist/mashiro-agent_darwin_amd64      .
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o ../dist/mashiro-agent_darwin_arm64      .
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../dist/mashiro-agent_windows_amd64.exe .

          echo "Built agent binaries:"
          ls -lh ../dist/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
